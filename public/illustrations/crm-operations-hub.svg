<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="crmHubTitle">
  <title id="crmHubTitle">Connected Salesforce operations across sales, service, automation, analytics and integrations</title>
  <defs>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0D9DDA" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0D9DDA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hubCenter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D3C66"/>
      <stop offset="100%" stop-color="#021F43"/>
    </linearGradient>
  </defs>

  <rect width="720" height="560" fill="#FFFFFF"/>
  <circle cx="360" cy="280" r="260" fill="url(#hubGlow)"/>
  <circle cx="360" cy="280" r="210" fill="none" stroke="#BFE6F5" stroke-width="1.5" stroke-dasharray="3 8"/>

  <!-- connecting lines -->
  <g stroke="#0D9DDA" stroke-width="3" stroke-linecap="round">
    <line x1="360" y1="230" x2="360" y2="100"/>
    <line x1="410" y1="255" x2="527" y2="215"/>
    <line x1="410" y1="310" x2="456" y2="420"/>
    <line x1="310" y1="310" x2="264" y2="420"/>
    <line x1="310" y1="255" x2="193" y2="215"/>
  </g>
  <g fill="#0D9DDA">
    <circle cx="360" cy="100" r="5"/>
    <circle cx="527" cy="215" r="5"/>
    <circle cx="456" cy="420" r="5"/>
    <circle cx="264" cy="420" r="5"/>
    <circle cx="193" cy="215" r="5"/>
  </g>

  <!-- center platform node -->
  <rect x="280" y="230" width="160" height="100" rx="18" fill="url(#hubCenter)"/>
  <g transform="translate(330,254)" fill="#5FC4EE">
    <circle cx="0" cy="6" r="4"/>
    <circle cx="15" cy="0" r="4"/>
    <circle cx="30" cy="6" r="4"/>
    <path d="M0 6 L15 0 L30 6" stroke="#5FC4EE" stroke-width="1.5" fill="none"/>
  </g>
  <text x="360" y="288" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Salesforce</text>
  <text x="360" y="308" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Platform</text>

  <!-- Integrations (top) -->
  <g transform="translate(285,45)">
    <rect width="150" height="58" rx="16" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <path d="M20 29 h10 M34 29 h10" stroke="#0D9DDA" stroke-width="3" stroke-linecap="round"/>
    <circle cx="18" cy="29" r="4" fill="#0D9DDA"/>
    <circle cx="46" cy="29" r="4" fill="#0D9DDA"/>
    <text x="95" y="34" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="600" fill="#032D60">Integrations</text>
  </g>

  <!-- Analytics (upper right) -->
  <g transform="translate(452,186)">
    <rect width="150" height="58" rx="16" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <g transform="translate(16,16)" fill="#0D9DDA">
      <rect x="0" y="16" width="6" height="10"/>
      <rect x="10" y="8" width="6" height="18"/>
      <rect x="20" y="0" width="6" height="26"/>
    </g>
    <text x="95" y="34" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="600" fill="#032D60">Analytics</text>
  </g>

  <!-- Service (lower right) -->
  <g transform="translate(381,391)">
    <rect width="150" height="58" rx="16" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <path d="M18 15 h22 a6 6 0 0 1 6 6 v8 a6 6 0 0 1 -6 6 h-12 l-8 7 v-7 h-2 a6 6 0 0 1 -6 -6 v-8 a6 6 0 0 1 6 -6 z" fill="none" stroke="#0D9DDA" stroke-width="2.5"/>
    <text x="95" y="34" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="600" fill="#032D60">Service</text>
  </g>

  <!-- Automation (lower left) -->
  <g transform="translate(189,391)">
    <rect width="150" height="58" rx="16" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <g transform="translate(18,15)" stroke="#0D9DDA" stroke-width="2.2" fill="none">
      <circle cx="14" cy="14" r="6"/>
      <path d="M14 2 v4 M14 22 v4 M2 14 h4 M22 14 h4 M5 5 l3 3 M20 20 l3 3 M23 5 l-3 3 M8 20 l-3 3"/>
    </g>
    <text x="95" y="34" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="600" fill="#032D60">Automation</text>
  </g>

  <!-- Sales (upper left) -->
  <g transform="translate(118,186)">
    <rect width="150" height="58" rx="16" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <path d="M16 14 h22 l-8 26 h-6 z" fill="none" stroke="#0D9DDA" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="95" y="34" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="600" fill="#032D60">Sales</text>
  </g>
</svg>
