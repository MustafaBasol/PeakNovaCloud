<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="deliveryTitle">
  <title id="deliveryTitle">A controlled path from discovery to delivery, aligning business and technical teams</title>
  <defs>
    <linearGradient id="deliveryBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4FBFE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="520" fill="url(#deliveryBg)"/>

  <line x1="140" y1="280" x2="1060" y2="280" stroke="#BFE6F5" stroke-width="4"/>

  <g font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="600" fill="#032D60" text-anchor="middle">

    <!-- Discovery -->
    <circle cx="220" cy="280" r="12" fill="#0D9DDA"/>
    <rect x="160" y="150" width="120" height="90" rx="14" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <g transform="translate(195,175)" stroke="#0D9DDA" stroke-width="2.4" fill="none">
      <circle cx="16" cy="16" r="12"/>
      <line x1="25" y1="25" x2="35" y2="35"/>
    </g>
    <text x="220" y="270">Discovery</text>

    <!-- Alignment -->
    <circle cx="480" cy="280" r="12" fill="#0D9DDA"/>
    <rect x="420" y="310" width="120" height="90" rx="14" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <g transform="translate(454,336)" stroke="#0D9DDA" stroke-width="2.2" fill="none">
      <circle cx="10" cy="10" r="8"/>
      <circle cx="42" cy="10" r="8"/>
      <path d="M4 40 v-4 a10 10 0 0 1 12 -8 M36 40 v-4 a10 10 0 0 0 -12 -8"/>
    </g>
    <text x="480" y="425">Alignment</text>

    <!-- Build -->
    <circle cx="740" cy="280" r="12" fill="#0D9DDA"/>
    <rect x="680" y="150" width="120" height="90" rx="14" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <g transform="translate(715,175)" stroke="#0D9DDA" stroke-width="2.2" fill="none">
      <circle cx="16" cy="16" r="9"/>
      <path d="M16 1 v6 M16 35 v6 M1 16 h6 M35 16 h6 M6 6 l4.5 4.5 M25.5 25.5 l4.5 4.5 M32 6 l-4.5 4.5 M10.5 25.5 l-4.5 4.5"/>
    </g>
    <text x="740" y="270">Build</text>

    <!-- Delivery -->
    <circle cx="990" cy="280" r="12" fill="#0D9DDA"/>
    <rect x="930" y="310" width="120" height="90" rx="14" fill="#021F43"/>
    <g transform="translate(963,336)" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 16 l12 12 l24 -26"/>
    </g>
    <text x="990" y="425" fill="#FFFFFF">Delivery</text>
  </g>
</svg>
