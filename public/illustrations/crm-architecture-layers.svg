<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="archTitle">
  <title id="archTitle">A modular, maintainable CRM architecture built from connected layers</title>
  <defs>
    <linearGradient id="archBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4FBFE"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#archBg)"/>

  <rect x="130" y="60" width="10" height="480" rx="5" fill="#0D9DDA" opacity="0.35"/>

  <!-- layer template: y positions -->
  <g font-family="Montserrat, Arial, sans-serif" font-size="17" font-weight="600">

    <!-- Users -->
    <rect x="170" y="60" width="500" height="68" rx="12" fill="#021F43"/>
    <circle cx="205" cy="94" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
    <path d="M190 116 v-4 a15 15 0 0 1 30 0 v4" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
    <text x="240" y="100" fill="#FFFFFF">Users</text>

    <!-- Processes -->
    <rect x="170" y="140" width="500" height="68" rx="12" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <g stroke="#0D9DDA" stroke-width="2.2" fill="none" stroke-linecap="round">
      <path d="M193 174 h16 M193 188 h24"/>
    </g>
    <text x="240" y="180" fill="#032D60">Processes</text>

    <!-- Automation -->
    <rect x="170" y="220" width="500" height="68" rx="12" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <g transform="translate(193,240)" stroke="#0D9DDA" stroke-width="2" fill="none">
      <circle cx="14" cy="14" r="7"/>
      <path d="M14 1 v5 M14 22 v5 M1 14 h5 M22 14 h5 M5 5 l3.5 3.5 M20 20 l3.5 3.5 M23 5 l-3.5 3.5 M8 20 l-3.5 3.5"/>
    </g>
    <text x="240" y="260" fill="#032D60">Automation</text>

    <!-- Data -->
    <rect x="170" y="300" width="500" height="68" rx="12" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <g transform="translate(193,318)" stroke="#0D9DDA" stroke-width="2" fill="none">
      <ellipse cx="14" cy="6" rx="12" ry="5"/>
      <path d="M2 6 v20 a12 5 0 0 0 24 0 v-20"/>
      <path d="M2 16 a12 5 0 0 0 24 0"/>
    </g>
    <text x="240" y="340" fill="#032D60">Data</text>

    <!-- Integrations -->
    <rect x="170" y="380" width="500" height="68" rx="12" fill="#FFFFFF" stroke="#0D9DDA" stroke-width="2"/>
    <g transform="translate(193,400)" stroke="#0D9DDA" stroke-width="2.4" fill="none" stroke-linecap="round">
      <path d="M2 14 h8 M30 14 h8"/>
      <rect x="10" y="6" width="12" height="16" rx="4"/>
    </g>
    <text x="240" y="420" fill="#032D60">Integrations</text>

    <!-- Reporting -->
    <rect x="170" y="460" width="500" height="68" rx="12" fill="#021F43"/>
    <g transform="translate(193,478)" fill="#FFFFFF">
      <rect x="0" y="18" width="7" height="12"/>
      <rect x="11" y="10" width="7" height="20"/>
      <rect x="22" y="2" width="7" height="28"/>
    </g>
    <text x="240" y="500" fill="#FFFFFF">Reporting</text>
  </g>
</svg>
