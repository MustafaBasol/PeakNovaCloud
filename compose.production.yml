services:
  postgres:
    image: postgres:16-alpine
    container_name: peaknova-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-peaknova}
      POSTGRES_USER: ${POSTGRES_USER:-peaknova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-peaknova} -d ${POSTGRES_DB:-peaknova}']
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peaknova-app-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-peaknova}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-peaknova}?schema=public
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PASSWORD: ${PASSWORD}
      MAIL_PASS: ${MAIL_PASS:-}
      EMAIL: ${EMAIL:-}
    ports:
      - '${APP_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_prod_data:
